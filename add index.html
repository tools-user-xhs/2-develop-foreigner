<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>极稳货币兑换 · 一次成功 · 丝滑体验</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f0f4fa 0%, #e9eef4 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .card {
            max-width: 760px;
            width: 100%;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 2.5rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08), 0 1px 2px rgba(0, 0, 0, 0.02);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .card-header {
            padding: 1.8rem 2rem 0.8rem 2rem;
            border-bottom: 1px solid #f0f0f0;
        }

        .card-header h1 {
            font-size: 1.85rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1A2A3F, #2C3E50);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .card-header p {
            color: #6c7a8e;
            font-size: 0.9rem;
            margin-top: 0.4rem;
            font-weight: 450;
        }

        .card-body {
            padding: 2rem;
        }

        .currency-swap-area {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.8rem;
            flex-wrap: wrap;
        }

        .currency-box {
            flex: 1;
            min-width: 180px;
            background: #f9fafc;
            border-radius: 1.5rem;
            padding: 0.8rem 1rem 1rem 1rem;
            border: 1px solid #eef2f8;
        }

        .currency-box label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            color: #5b6e8c;
            display: block;
            margin-bottom: 0.5rem;
        }

        .select-wrapper {
            position: relative;
        }

        select {
            width: 100%;
            padding: 0.8rem 0.9rem;
            font-size: 1rem;
            font-weight: 500;
            background-color: white;
            border: 1px solid #e2e8f0;
            border-radius: 1.2rem;
            appearance: none;
            cursor: pointer;
            color: #1e2a3e;
            transition: all 0.2s;
            font-family: inherit;
        }

        select:focus {
            outline: none;
            border-color: #7f8cfa;
            box-shadow: 0 0 0 3px rgba(127, 140, 250, 0.15);
        }

        .select-wrapper::after {
            content: "⌵";
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            color: #7e8c9e;
            pointer-events: none;
        }

        .swap-button {
            width: 44px;
            height: 44px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.4rem;
            color: #2c3e50;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            flex-shrink: 0;
        }

        .swap-button:hover {
            background: #eef2fa;
            transform: scale(1.02);
            border-color: #cbd5e1;
        }

        .swap-button:active {
            transform: scale(0.98);
        }

        .amount-section {
            margin-bottom: 1.5rem;
        }

        .amount-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #5b6e8c;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
            display: block;
        }

        .amount-input-wrapper {
            display: flex;
            align-items: center;
            background: #f9fafc;
            border: 1px solid #eef2f8;
            border-radius: 1.5rem;
            transition: all 0.2s;
            padding: 0.2rem 0.2rem 0.2rem 1.2rem;
        }

        .amount-input-wrapper:focus-within {
            border-color: #7f8cfa;
            box-shadow: 0 0 0 3px rgba(127, 140, 250, 0.1);
            background: white;
        }

        .currency-symbol {
            font-size: 1.1rem;
            font-weight: 500;
            color: #2c3e50;
            background: #eef2fa;
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            margin-right: 0.8rem;
        }

        input[type="number"] {
            flex: 1;
            border: none;
            background: transparent;
            padding: 0.9rem 0;
            font-size: 1.35rem;
            font-weight: 500;
            font-family: inherit;
            color: #111827;
            outline: none;
        }

        input[type="number"]::placeholder {
            color: #b9c2d0;
            font-weight: 400;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.8rem;
        }

        .btn {
            flex: 1;
            border: none;
            padding: 0.9rem 0;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 2rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: #1e2f41;
            color: white;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
        }

        .btn-primary:hover {
            background: #2c4058;
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
        }

        .btn-secondary {
            background: #eef2fa;
            color: #2c3e50;
            border: 1px solid #dce5f0;
        }

        .btn-secondary:hover {
            background: #e2e9f3;
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result-panel {
            background: #f7f9fe;
            border-radius: 1.5rem;
            padding: 1.2rem 1.5rem;
            border: 1px solid #eef2fc;
            transition: all 0.2s;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 0.8rem;
        }

        .result-label {
            font-size: 0.8rem;
            font-weight: 500;
            color: #5b6c8a;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .result-value {
            font-size: 1.7rem;
            font-weight: 700;
            color: #1a2c3e;
            word-break: break-word;
            text-align: right;
        }

        .rate-info {
            border-top: 1px dashed #e2eaf1;
            margin-top: 0.7rem;
            padding-top: 0.7rem;
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            color: #5d7188;
        }

        .rate-badge {
            background: #eef2fa;
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            font-family: monospace;
            font-size: 0.75rem;
        }

        .error-message {
            color: #e26d6d;
            font-size: 0.8rem;
            margin-top: 0.5rem;
            text-align: center;
            font-weight: 500;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            padding: 1rem 2rem 1.5rem;
            color: #8f9bb3;
            border-top: 1px solid #f0f3f8;
        }

        @media (max-width: 600px) {
            .card-body {
                padding: 1.5rem;
            }
            .currency-swap-area {
                flex-direction: column;
            }
            .swap-button {
                transform: rotate(90deg);
                margin: 0.2rem 0;
            }
            .result-value {
                font-size: 1.4rem;
            }
            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header">
        <h1>⚡ 极稳货币兑换</h1>
        <p>智能重试 · 一次成功 · 丝滑流畅</p>
    </div>
    <div class="card-body">
        <!-- 双币种区域 + 交换按钮 -->
        <div class="currency-swap-area">
            <div class="currency-box">
                <label>💵 持有币种</label>
                <div class="select-wrapper">
                    <select id="fromCurrency"></select>
                </div>
            </div>
            <div class="swap-button" id="swapCurrenciesBtn" title="交换币种">
                ⇄
            </div>
            <div class="currency-box">
                <label>🔄 兑换币种</label>
                <div class="select-wrapper">
                    <select id="toCurrency"></select>
                </div>
            </div>
        </div>

        <!-- 金额输入区 -->
        <div class="amount-section">
            <span class="amount-label">💰 兑换金额</span>
            <div class="amount-input-wrapper">
                <span class="currency-symbol" id="fromSymbol">USD</span>
                <input type="number" id="amountInput" placeholder="0.00" value="100.00" step="any">
            </div>
        </div>

        <!-- 双按钮 -->
        <div class="action-buttons">
            <button class="btn btn-primary" id="convertBtn">
                <span>✨</span> 兑换查询
            </button>
            <button class="btn btn-secondary" id="refreshRateBtn">
                <span>🔄</span> 刷新汇率
            </button>
        </div>

        <!-- 结果展示区 -->
        <div class="result-panel" id="resultPanel">
            <div class="result-row">
                <span class="result-label">兑换结果</span>
                <span class="result-value" id="resultAmount">—</span>
            </div>
            <div class="rate-info">
                <span>💹 实时参考汇率</span>
                <span class="rate-badge" id="rateDisplay">1 : —</span>
            </div>
            <div class="rate-info">
                <span>🕒 数据更新时间</span>
                <span id="updateTime">等待查询</span>
            </div>
            <div id="errorMsg" class="error-message"></div>
        </div>
    </div>
    <footer>
        双源并行 + 自动重试 · 确保一次成功 · 极速响应
    </footer>
</div>

<script>
    // ---------- 币种库 ----------
    const CURRENCY_LIST = [
        { code: "USD", name: "美元", symbol: "$" },
        { code: "EUR", name: "欧元", symbol: "€" },
        { code: "GBP", name: "英镑", symbol: "£" },
        { code: "JPY", name: "日元", symbol: "¥" },
        { code: "CNY", name: "人民币", symbol: "¥" },
        { code: "SEK", name: "瑞典克朗", symbol: "kr" },
        { code: "NOK", name: "挪威克朗", symbol: "kr" },
        { code: "DKK", name: "丹麦克朗", symbol: "kr" },
        { code: "CZK", name: "捷克克朗", symbol: "Kč" },
        { code: "CHF", name: "瑞士法郎", symbol: "₣" },
        { code: "CAD", name: "加拿大元", symbol: "C$" },
        { code: "AUD", name: "澳大利亚元", symbol: "A$" },
        { code: "SGD", name: "新加坡元", symbol: "S$" },
        { code: "HKD", name: "港币", symbol: "HK$" },
        { code: "KRW", name: "韩元", symbol: "₩" },
        { code: "INR", name: "印度卢比", symbol: "₹" },
        { code: "MXN", name: "墨西哥比索", symbol: "$" },
        { code: "ZAR", name: "南非兰特", symbol: "R" }
    ];

    // DOM 元素
    const fromSelect = document.getElementById('fromCurrency');
    const toSelect = document.getElementById('toCurrency');
    const amountInput = document.getElementById('amountInput');
    const convertBtn = document.getElementById('convertBtn');
    const refreshRateBtn = document.getElementById('refreshRateBtn');
    const swapBtn = document.getElementById('swapCurrenciesBtn');
    const resultAmountSpan = document.getElementById('resultAmount');
    const rateDisplaySpan = document.getElementById('rateDisplay');
    const updateTimeSpan = document.getElementById('updateTime');
    const errorMsgDiv = document.getElementById('errorMsg');
    const fromSymbolSpan = document.getElementById('fromSymbol');

    // ---------- 缓存 ----------
    let rateCache = {
        fromCode: null,
        toCode: null,
        rate: null,
        date: null,
        source: null,
        timestamp: 0
    };
    const CACHE_TTL = 10000; // 10秒内有效

    // 辅助函数
    function populateCurrencySelects() {
        fromSelect.innerHTML = '';
        toSelect.innerHTML = '';
        CURRENCY_LIST.forEach(currency => {
            const optionFrom = document.createElement('option');
            optionFrom.value = currency.code;
            optionFrom.textContent = `${currency.name} (${currency.code})`;
            fromSelect.appendChild(optionFrom);

            const optionTo = document.createElement('option');
            optionTo.value = currency.code;
            optionTo.textContent = `${currency.name} (${currency.code})`;
            toSelect.appendChild(optionTo);
        });
        fromSelect.value = 'USD';
        toSelect.value = 'SEK';
        updateFromSymbol();
    }

    function updateFromSymbol() {
        const selectedCode = fromSelect.value;
        const found = CURRENCY_LIST.find(c => c.code === selectedCode);
        fromSymbolSpan.textContent = found ? `${found.symbol} ${selectedCode}` : selectedCode;
    }

    function clearError() {
        errorMsgDiv.textContent = '';
    }

    function showError(msg, isTemporary = true) {
        errorMsgDiv.textContent = msg;
        if (isTemporary) {
            setTimeout(() => {
                if (errorMsgDiv.textContent === msg) errorMsgDiv.textContent = '';
            }, 5000);
        }
    }

    function formatCurrency(value, currencyCode) {
        if (isNaN(value) || value === null) return '—';
        const rounded = Math.round(value * 100) / 100;
        const found = CURRENCY_LIST.find(c => c.code === currencyCode);
        const symbol = found ? found.symbol : '';
        const formattedNum = rounded.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        return symbol ? `${symbol} ${formattedNum}` : `${formattedNum} ${currencyCode}`;
    }

    // ---------- 各API请求函数（超时4秒） ----------
    async function fetchFromFrankfurter(fromCode, toCode, timeoutMs = 4000) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
        try {
            const url = `https://api.frankfurter.app/latest?from=${fromCode}&to=${toCode}`;
            const response = await fetch(url, { signal: controller.signal });
            clearTimeout(timeoutId);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            if (!data || !data.rates) throw new Error('无效数据');
            const rate = data.rates[toCode];
            if (!rate || typeof rate !== 'number') throw new Error(`无 ${toCode} 汇率`);
            return { rate, date: data.date, source: 'frankfurter.app' };
        } catch (err) {
            clearTimeout(timeoutId);
            throw err;
        }
    }

    async function fetchFromExchangeRateHost(fromCode, toCode, timeoutMs = 4000) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
        try {
            const url = `https://api.exchangerate.host/latest?base=${fromCode}`;
            const response = await fetch(url, { signal: controller.signal });
            clearTimeout(timeoutId);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            if (!data || !data.rates) throw new Error('无效数据');
            const rate = data.rates[toCode];
            if (!rate || typeof rate !== 'number') throw new Error(`无 ${toCode} 汇率`);
            return { rate, date: data.date, source: 'exchangerate.host' };
        } catch (err) {
            clearTimeout(timeoutId);
            throw err;
        }
    }

    // 核心：并行请求所有源，返回第一个成功的，如果全部失败则抛出异常
    async function fetchRateParallel(fromCode, toCode) {
        const promises = [
            fetchFromFrankfurter(fromCode, toCode),
            fetchFromExchangeRateHost(fromCode, toCode)
        ];
        // Promise.any 返回第一个成功的，如果全部失败则抛出 AggregateError
        return await Promise.any(promises);
    }

    // 带重试的汇率获取（最多2次，间隔500ms）
    async function fetchRateWithRetry(fromCode, toCode, retries = 2) {
        let lastError = null;
        for (let i = 0; i <= retries; i++) {
            try {
                const result = await fetchRateParallel(fromCode, toCode);
                return result;
            } catch (err) {
                lastError = err;
                if (i < retries) {
                    await new Promise(r => setTimeout(r, 500)); // 延迟重试
                }
            }
        }
        throw lastError || new Error('所有汇率源均失败');
    }

    // 获取汇率（带缓存）
    async function getRate(fromCode, toCode, forceRefresh = false) {
        // 相同币种特殊处理
        if (fromCode === toCode) {
            return { rate: 1, date: new Date().toISOString(), source: 'same_currency' };
        }

        const now = Date.now();
        // 检查缓存是否有效
        if (!forceRefresh && 
            rateCache.fromCode === fromCode && 
            rateCache.toCode === toCode && 
            rateCache.rate !== null &&
            (now - rateCache.timestamp) < CACHE_TTL) {
            return { rate: rateCache.rate, date: rateCache.date, source: rateCache.source, cached: true };
        }

        // 请求最新汇率（带重试）
        const result = await fetchRateWithRetry(fromCode, toCode, 2);
        // 更新缓存
        rateCache = {
            fromCode,
            toCode,
            rate: result.rate,
            date: result.date,
            source: result.source,
            timestamp: now
        };
        return result;
    }

    // 核心兑换逻辑（更新界面）
    async function performConversion(forceRefresh = false, showLoading = true) {
        clearError();
        const fromCode = fromSelect.value;
        const toCode = toSelect.value;
        let amount = parseFloat(amountInput.value);

        if (isNaN(amount) || amount === null || amount === '') {
            showError('⚠️ 请输入有效的金额数字');
            resultAmountSpan.textContent = '无效金额';
            return false;
        }
        if (amount <= 0) {
            showError('⚠️ 金额必须大于 0');
            resultAmountSpan.textContent = '请输入正数';
            return false;
        }

        // 相同币种直接返回
        if (fromCode === toCode) {
            const formatted = formatCurrency(amount, toCode);
            resultAmountSpan.textContent = formatted;
            rateDisplaySpan.innerHTML = `1 ${fromCode} = 1 ${toCode}`;
            updateTimeSpan.textContent = `${new Date().toLocaleString()} (相同币种)`;
            return true;
        }

        if (showLoading) {
            convertBtn.disabled = true;
            refreshRateBtn.disabled = true;
        }

        try {
            const { rate, date, source, cached } = await getRate(fromCode, toCode, forceRefresh);
            const converted = amount * rate;
            resultAmountSpan.textContent = formatCurrency(converted, toCode);
            rateDisplaySpan.innerHTML = `1 ${fromCode} = ${rate.toFixed(6)} ${toCode}`;
            let timeStr = date ? new Date(date).toLocaleString() + ' (UTC)' : new Date().toLocaleString();
            if (cached) timeStr += ' (缓存)';
            updateTimeSpan.textContent = `${timeStr} · ${source}`;
            return true;
        } catch (err) {
            console.error("汇率获取失败:", err);
            let friendlyMsg = '⚠️ 汇率服务暂时不可用，请检查网络后重试。';
            if (err.name === 'AbortError') friendlyMsg = '⏱️ 请求超时，请检查网络后重试。';
            else if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError')) friendlyMsg = '⚠️ 网络连接失败，请确认互联网后重试。';
            showError(friendlyMsg);
            resultAmountSpan.textContent = '获取失败';
            rateDisplaySpan.innerHTML = '— : —';
            updateTimeSpan.textContent = '查询失败';
            return false;
        } finally {
            if (showLoading) {
                convertBtn.disabled = false;
                refreshRateBtn.disabled = false;
            }
        }
    }

    // 刷新汇率（强制刷新）
    async function refreshRateOnly() {
        clearError();
        const amount = parseFloat(amountInput.value);
        if (isNaN(amount) || amount <= 0) {
            showError('请先输入有效的正数金额');
            return;
        }
        const originalText = refreshRateBtn.innerHTML;
        refreshRateBtn.disabled = true;
        convertBtn.disabled = true;
        refreshRateBtn.innerHTML = `<span>⏳</span> 刷新中...`;
        try {
            await performConversion(true, false);
            showError('✅ 汇率已刷新', true);
        } catch (err) {
            showError('刷新失败，请稍后重试');
        } finally {
            refreshRateBtn.disabled = false;
            convertBtn.disabled = false;
            refreshRateBtn.innerHTML = originalText;
        }
    }

    // 交换币种
    function swapCurrencies() {
        const fromVal = fromSelect.value;
        const toVal = toSelect.value;
        fromSelect.value = toVal;
        toSelect.value = fromVal;
        updateFromSymbol();
        clearError();
        const amount = parseFloat(amountInput.value);
        if (!isNaN(amount) && amount > 0) {
            performConversion(true, true); // 交换后强制刷新
        } else {
            resultAmountSpan.textContent = '—';
            rateDisplaySpan.innerHTML = '输入金额后查询';
            updateTimeSpan.textContent = '待更新';
        }
    }

    // 币种变化自动查询
    let currencyChangeTimer = null;
    function onCurrencyChange() {
        updateFromSymbol();
        clearError();
        const fromCode = fromSelect.value;
        const toCode = toSelect.value;
        const amount = parseFloat(amountInput.value);
        if (fromCode === toCode) {
            if (!isNaN(amount) && amount > 0) {
                resultAmountSpan.textContent = formatCurrency(amount, toCode);
                rateDisplaySpan.innerHTML = `1 ${fromCode} = 1 ${toCode}`;
                updateTimeSpan.textContent = `${new Date().toLocaleString()} (相同币种)`;
            } else {
                resultAmountSpan.textContent = '—';
                rateDisplaySpan.innerHTML = '点击查询或刷新';
                updateTimeSpan.textContent = '待更新';
            }
        } else {
            if (!isNaN(amount) && amount > 0) {
                if (currencyChangeTimer) clearTimeout(currencyChangeTimer);
                currencyChangeTimer = setTimeout(() => {
                    performConversion(false, true);
                }, 150);
            } else {
                resultAmountSpan.textContent = '—';
                rateDisplaySpan.innerHTML = '输入金额后查询';
                updateTimeSpan.textContent = '待更新';
            }
        }
    }

    // 金额变化防抖自动查询
    let amountDebounceTimer = null;
    function onAmountChange() {
        clearError();
        const amount = parseFloat(amountInput.value);
        const fromCode = fromSelect.value;
        const toCode = toSelect.value;
        if (fromCode === toCode && !isNaN(amount) && amount > 0) {
            resultAmountSpan.textContent = formatCurrency(amount, toCode);
        } else if (!isNaN(amount) && amount > 0 && fromCode !== toCode) {
            if (amountDebounceTimer) clearTimeout(amountDebounceTimer);
            amountDebounceTimer = setTimeout(() => {
                performConversion(false, true);
            }, 200);
        } else if (isNaN(amount) || amount <= 0) {
            resultAmountSpan.textContent = '—';
        }
    }

    // 页面初始化
    window.addEventListener('DOMContentLoaded', async () => {
        populateCurrencySelects();
        updateFromSymbol();
        // 初始加载，带重试，确保成功
        await performConversion(false, true);
    });

    // 事件绑定
    fromSelect.addEventListener('change', onCurrencyChange);
    toSelect.addEventListener('change', onCurrencyChange);
    amountInput.addEventListener('input', onAmountChange);
    convertBtn.addEventListener('click', () => performConversion(true, true));
    refreshRateBtn.addEventListener('click', refreshRateOnly);
    swapBtn.addEventListener('click', swapCurrencies);
</script>
</body>
</html>
