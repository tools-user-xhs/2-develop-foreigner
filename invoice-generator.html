            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f0f5fe 0%, #e9f0fa 100%);
            min-height: 100vh;
            padding: 2rem 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .toolbox {
            max-width: 1400px;
            width: 100%;
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(4px);
            border-radius: 3rem;
            padding: 2rem 2rem 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0,20,60,0.25);
            border: 1px solid rgba(255,255,255,0.6);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1a2a4f, #2c3e6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .header h1 i {
            background: #ffffffcc;
            padding: 0.6rem;
            border-radius: 2rem;
            color: #1e3c72;
            box-shadow: 0 8px 16px -8px #1e3c7230;
            font-size: 1.8rem;
        }

        .one-click-btn {
            background: #1e2f4f;
            color: white;
            border: none;
            padding: 0.9rem 2rem;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            cursor: pointer;
            box-shadow: 0 10px 20px -5px #1e2f4f70;
            transition: all 0.2s ease;
            border: 1px solid #ffffff30;
            letter-spacing: 0.3px;
        }

        .one-click-btn:hover {
            background: #143157;
            transform: translateY(-3px);
            box-shadow: 0 18px 25px -8px #0a1a33;
        }

        .one-click-btn i {
            font-size: 1.2rem;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.8rem;
            margin-top: 0.8rem;
        }

        .card {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 1.8rem 1.5rem;
            box-shadow: 0 15px 35px -15px rgba(20,40,70,0.15);
            border: 1px solid rgba(255,255,255,0.7);
            transition: 0.2s;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            background: rgba(255,255,255,0.9);
            box-shadow: 0 25px 40px -18px #1e3c7250;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #14273e;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            border-bottom: 2px dashed #b3c7e5;
            padding-bottom: 0.75rem;
        }

        .card-title i {
            color: #2f5e9c;
            font-size: 1.5rem;
            width: 2rem;
        }

        .selector-area {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .select-input {
            background: white;
            border: 1px solid #d4e0f0;
            border-radius: 40px;
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            color: #14273e;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: inset 0 2px 5px #00000008;
        }

        .select-input:focus {
            border-color: #2f5e9c;
            box-shadow: 0 0 0 3px #2f5e9c30;
        }

        .query-btn {
            background: white;
            border: 1px solid #b9d0ef;
            color: #1d3a5c;
            padding: 0.8rem 1rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 4px 12px #c0d2f030;
        }

        .query-btn:hover {
            background: #e5efff;
            border-color: #2f5e9c;
            color: #0d2b4b;
            transform: scale(1.02);
        }

        .query-btn i {
            font-size: 0.95rem;
        }

        .result-panel {
            background: #f7faff;
            border-radius: 1.5rem;
            padding: 1.5rem 1.2rem;
            margin-top: 0.8rem;
            border: 1px solid #e7f0fd;
            box-shadow: inset 0 2px 6px #cad8ec30;
            flex: 1;
            min-height: 200px;
        }

        .method-item {
            background: white;
            border-radius: 1.2rem;
            padding: 1rem 1rem 1.2rem;
            margin-bottom: 1.2rem;
            box-shadow: 0 6px 14px #dbe4f2;
            border: 1px solid #ffffff;
        }

        .method-item h4 {
            font-size: 1rem;
            font-weight: 600;
            color: #17345c;
            margin-bottom: 0.7rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .method-item h4 i {
            color: #2a5f9e;
            font-size: 0.9rem;
        }

        .method-item p {
            font-size: 0.85rem;
            color: #3d5f8b;
            margin-bottom: 0.5rem;
        }

        .simulate-input-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin: 0.6rem 0 0.2rem;
        }

        .sim-input {
            background: #f3f7ff;
            border: 1px solid #c7daf5;
            border-radius: 30px;
            padding: 0.6rem 1rem;
            font-size: 0.85rem;
            flex: 1 1 120px;
            color: #102a44;
        }

        .sim-input::placeholder {
            color: #7e95b9;
            font-weight: 400;
            opacity: 0.8;
        }

        .sim-btn {
            background: #dce7fc;
            border: none;
            border-radius: 30px;
            padding: 0.5rem 1.2rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: #173868;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid #aec6ee;
            white-space: nowrap;
        }

        .sim-btn:hover {
            background: #c2d6f5;
        }

        .tip-badge {
            background: #e3eefb;
            border-radius: 30px;
            padding: 0.25rem 1rem;
            font-size: 0.8rem;
            color: #203e6b;
            display: inline-block;
            margin-top: 0.4rem;
            font-weight: 500;
        }

        /* 市场透视区域卡片样式 */
        .market-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 0.5rem;
        }
        .market-region-card {
            background: white;
            border-radius: 1.2rem;
            padding: 1rem;
            flex: 1 1 calc(50% - 0.5rem);
            min-width: 160px;
            box-shadow: 0 4px 10px rgba(0,20,50,0.05);
            border: 1px solid #e3ebf6;
        }
        .region-name {
            font-weight: 600;
            color: #1e3c72;
            font-size: 1.1rem;
            margin-bottom: 0.3rem;
        }
        .heat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #17345c;
            line-height: 1.2;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .trend {
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.2rem;
            background: #eaf2ff;
            border-radius: 30px;
            padding: 0.2rem 0.7rem;
        }
        .trend.up {
            color: #0f7b3a;
        }
        .trend.down {
            color: #b13e3e;
        }
        .trend.stable {
            color: #a0671d;
        }

            margin-top: 0.8rem;
            font-size: 0.85rem;
            color: #2d4b7a;
        }
        .channel-list span {
            display: inline-block;
            background: #e8f0fe;
            border-radius: 30px;
            padding: 0.2rem 0.8rem;
            margin: 0.2rem 0.2rem;
            font-size: 0.75rem;
        }
        .market-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }
        .market-header .title {
            font-weight: 600;
            color: #14273e;
        }

            list-style: none;
            padding-left: 0.3rem;
        }
        .content-tip-list li {
            margin-bottom: 0.6rem;
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
        }
        .content-tip-list li i {
            color: #1f8b4c;
            margin-top: 0.2rem;
        }
        .caution-box {
            background: #ffeae5;
            border-radius: 1rem;
            padding: 1rem;
            margin-top: 1rem;
        }
        .example-tag {
            background: #e0ebff;
            border-radius: 30px;
            padding: 0.2rem 1rem;
            font-size: 0.8rem;
            display: inline-block;
            margin-right: 0.4rem;
            margin-bottom: 0.3rem;
            color: #1e3e6e;
        }

            margin-top: 1.5rem;
            text-align: center;
            color: #5b739b;
            font-size: 0.9rem;
            font-weight: 400;
        }

            .card-grid {
                grid-template-columns: 1fr;
            }
            .toolbox {
                padding: 1.5rem;
            }
        }

</head>

        <footer>

        </footer>

            // ----- 市场透视：区域卡片展示 -----
            function getMarketInsight(industryKey, productValue) {
                const industry = industryProducts[industryKey]?.name || industryKey;
                const productObj = industryProducts[industryKey]?.products.find(p => p.value === productValue);
                const productDisplay = productObj ? productObj.label : productValue;

                const regions = [
                    { name: '北美', base: 90 },
                    { name: '欧洲', base: 85 },
                    { name: '澳洲', base: 75 },
                    { name: '日韩', base: 82 },
                    { name: '东南亚', base: 70 },
                    { name: '中东', base: 65 },
                    { name: '南美', base: 60 }
                ];

                const regionData = regions.map(r => {
                    let heat = Math.min(99, Math.max(50, r.base + Math.floor(Math.random() * 16) - 8));
                    const trendRand = Math.random();
                    let trend = 'stable';
                    if (trendRand < 0.4) trend = 'up';
                    else if (trendRand < 0.7) trend = 'down';
                    else trend = 'stable';

                    let channels = [];
                    if (r.name === '北美') channels = ['LinkedIn', '亚马逊', '行业展会'];
                    else if (r.name === '欧洲') channels = ['领英', '本地B2B平台', '行业论坛'];
                    else if (r.name === '澳洲') channels = ['Facebook', '本地电商'];
                    else if (r.name === '日韩') channels = ['Line', '本地采购平台'];
                    else if (r.name === '东南亚') channels = ['WhatsApp', 'Lazada/Shopee'];
                    else if (r.name === '中东') channels = ['WhatsApp', '展会', '本地贸易商'];
                    else if (r.name === '南美') channels = ['Facebook', 'MercadoLibre'];
                    
                    return { ...r, heat, trend, channels };
                });

                let html = `
                    <div class="market-header">
                        <span class="title">${industry} / ${productDisplay}</span>
                    </div>
                    <div class="market-grid">
                `;
                regionData.forEach(r => {
                    let trendIcon = '';
                    let trendClass = 'stable';
                    if (r.trend === 'up') {
                        trendIcon = '↑';
                        trendClass = 'up';
                    } else if (r.trend === 'down') {
                        trendIcon = '↓';
                        trendClass = 'down';
                    } else {
                        trendIcon = '→';
                        trendClass = 'stable';
                    }
                    html += `
                        <div class="market-region-card">
                            <div class="region-name">${r.name}</div>
                            <div class="heat-value">
                                ${r.heat}
                                <span class="trend ${trendClass}">${trendIcon} ${r.trend === 'up' ? '上升' : (r.trend === 'down' ? '下降' : '稳定')}</span>
                            </div>
                            <div class="channel-list">
                                ${r.channels.map(c => `<span>${c}</span>`).join('')}
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;
                return html;
            }
